site_name: 电路学习笔记
site_description: 主板电路分析与芯片手册整理
theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换暗色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换亮色模式

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - footnotes
  - toc:
      permalink: true

extra_javascript:
  - assets/pw.js
  - assets/lightbox.js

nav:
  - 首页: index.md
  - 信号索引: signals.md
  - RTC 相关信号: rtc-signals.md
  - 20V 供电公共点: 20v-power-rail.md
  - 隔离保护电路: isolation-protection.md
  - PWM 供电电路:
    - 3/5V 系统供电: system-power.md
    - CPU 平台供电: cpu-power.md
    - 内存供电: memory-power.md
    - Buck 电路实例: buck-examples.md
  - 待机与开机时序:
    - 待机供电轨 (VCCST/VCCPRIM): standby-power-rails.md
    - EC 待机架构: ec-standby.md
    - 上电时序与开机流程: power-on-sequence.md
  - 名词扫盲: embedded-glossary.md
